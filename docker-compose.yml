services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airseek
      POSTGRES_PASSWORD: airseek
      POSTGRES_DB: airseek
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airseek"]
      interval: 5s  
      timeout: 5s
      retries: 10

  collector:
    build:
      context: ./collector
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://airseek:airseek@db:5432/airseek
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://airseek:airseek@db:5432/airseek
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
